# SHERPA local development stack.
# Start:  docker compose --env-file ../.env up -d        (from the scripts/ directory)
# Stop :  docker compose --env-file ../.env down          (volumes are preserved)
#
# This local stack mirrors, for development only, the cloud services used by the deployed
# demo: a Solace PubSub+ broker (mirrors Solace Cloud), Qdrant (mirrors Qdrant Cloud Free)
# and Neo4j with APOC (mirrors Neo4j Aura Free). Image tags are pinned, never 'latest'.

services:

  solace:
    # Local event broker that mirrors the Solace Cloud broker used in the deployed demo.
    image: solace/solace-pubsub-standard:10.10
    container_name: sherpa-solace
    shm_size: 1g
    ulimits:
      core: -1
      nofile:
        soft: 2448
        hard: 6592
    ports:
      - "8080:8080"     # broker manager (admin UI)
      - "55555:55555"   # SMF (used by the Solace AI Connector)
      - "8008:8008"     # web messaging
      - "9000:9000"     # REST messaging
    environment:
      - username_admin_globalaccesslevel=admin
      - username_admin_password=${SOLACE_LOCAL_PASSWORD:-admin}
      - system_scaling_maxconnectioncount=100
    volumes:
      - solace_data:/var/lib/solace

  qdrant:
    # Pin the server tag to the same minor as the qdrant-client pinned in requirements.
    image: qdrant/qdrant:v1.12.4
    container_name: sherpa-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5.24-community
    container_name: sherpa-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_LOCAL_PASSWORD:-sherpa-dev-pass}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  solace_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
